AWSTemplateFormatVersion: "2010-09-09"
Description: "Padel Replay - S3, DynamoDB, Lambda (web UI), EC2 cloud recorder"

Parameters:
  EnvironmentName:
    Type: String
    Default: padel-replay
  LambdaAuthToken:
    Type: String
    NoEcho: true
    Description: Shared secret for Lambda (web UI auth, kept for compatibility)
  RecorderAuthToken:
    Type: String
    NoEcho: true
    Description: Shared secret for EC2 cloud recorder /save endpoint

Resources:

  # ------------------------------------------------------------
  # S3 BUCKET
  # ------------------------------------------------------------
  PadelClipsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-clips-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET, HEAD]
            AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]
            MaxAge: 3600

  PadelClipsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PadelClipsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${PadelClipsBucket.Arn}/*"

  # ------------------------------------------------------------
  # DYNAMODB
  # ------------------------------------------------------------
  PadelClipsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${EnvironmentName}-clips"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: clip_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: clip_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: timestamp-index
          KeySchema:
            - AttributeName: timestamp
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ------------------------------------------------------------
  # LAMBDA (web UI only)
  # ------------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaDynamoRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt PadelClipsTable.Arn
                  - !Sub "${PadelClipsTable.Arn}/index/*"

  PadelReplayFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentName}-handler"
      Runtime: python3.11
      Handler: lambda_handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref PadelClipsTable
          LAMBDA_AUTH_TOKEN: !Ref LambdaAuthToken
          APP_REGION: !Ref AWS::Region
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "placeholder"}

  # ------------------------------------------------------------
  # API GATEWAY
  # ------------------------------------------------------------
  PadelReplayApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${EnvironmentName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: [GET, POST, HEAD]
        AllowHeaders: ["*"]

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref PadelReplayApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt PadelReplayFunction.Arn
      PayloadFormatVersion: "2.0"

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PadelReplayApi
      RouteKey: "ANY /{proxy+}"
      Target: !Sub "integrations/${ApiIntegration}"

  RootRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref PadelReplayApi
      RouteKey: "GET /"
      Target: !Sub "integrations/${ApiIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref PadelReplayApi
      StageName: "$default"
      AutoDeploy: true

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PadelReplayFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PadelReplayApi}/*"

  # ------------------------------------------------------------
  # EC2 - CLOUD RECORDER
  # ------------------------------------------------------------
  RecorderSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Padel cloud recorder
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 1935
          ToPort: 1935
          CidrIp: 0.0.0.0/0
          Description: RTMP ingest from local stream relay
        - IpProtocol: tcp
          FromPort: 8554
          ToPort: 8554
          CidrIp: 0.0.0.0/0
          Description: RTSP ingest (MediaMTX fallback)
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0
          Description: Flask API for /save and /health
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH

  RecorderIAMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: RecorderAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject]
                Resource: !Sub "${PadelClipsBucket.Arn}/*"
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:Query, dynamodb:Scan]
                Resource:
                  - !GetAtt PadelClipsTable.Arn
                  - !Sub "${PadelClipsTable.Arn}/index/*"
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:aws:s3:::padel-deploy-${AWS::AccountId}-${AWS::Region}/*"

  RecorderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref RecorderIAMRole]

  RecorderInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}"
      IamInstanceProfile: !Ref RecorderInstanceProfile
      SecurityGroups: [!Ref RecorderSecurityGroup]
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-recorder"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          yum update -y
          yum install -y python3 python3-pip tar wget mesa-libGL libGL

          # Static FFmpeg
          cd /tmp
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar xf ffmpeg-release-amd64-static.tar.xz
          cp ffmpeg-*-amd64-static/ffmpeg /usr/local/bin/ffmpeg
          chmod +x /usr/local/bin/ffmpeg
          rm -rf /tmp/ffmpeg-*

          # MediaMTX (RTMP server)
          mkdir -p /opt/mediamtx && cd /opt/mediamtx
          MTX_VER=$(curl -s https://api.github.com/repos/bluenviron/mediamtx/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          wget -q "https://github.com/bluenviron/mediamtx/releases/download/${!MTX_VER}/mediamtx_${!MTX_VER}_linux_amd64.tar.gz"
          tar xf mediamtx_*.tar.gz && chmod +x mediamtx

          # Python packages
          pip3 install --quiet flask boto3 opencv-python-headless numpy

          # App directory + env file
          mkdir -p /opt/padel-recorder
          cat > /opt/padel-recorder/env << ENVEOF
          S3_BUCKET=${PadelClipsBucket}
          DYNAMODB_TABLE=${PadelClipsTable}
          RECORDER_AUTH_TOKEN=${RecorderAuthToken}
          AWS_DEFAULT_REGION=${AWS::Region}
          RTMP_URL=rtmp://localhost:1935/live/stream
          ENVEOF

          # MediaMTX systemd service
          cat > /etc/systemd/system/mediamtx.service << 'SVCEOF'
          [Unit]
          Description=MediaMTX RTMP Server
          After=network.target
          [Service]
          Type=simple
          ExecStart=/opt/mediamtx/mediamtx
          Restart=always
          RestartSec=3
          [Install]
          WantedBy=multi-user.target
          SVCEOF

          # Cloud recorder systemd service
          cat > /etc/systemd/system/padel-recorder.service << 'SVCEOF'
          [Unit]
          Description=Padel Cloud Recorder
          After=network.target mediamtx.service
          [Service]
          Type=simple
          EnvironmentFile=/opt/padel-recorder/env
          WorkingDirectory=/opt/padel-recorder
          ExecStart=/usr/bin/python3 /opt/padel-recorder/cloud_recorder.py
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          [Install]
          WantedBy=multi-user.target
          SVCEOF

          systemctl daemon-reload
          systemctl enable mediamtx
          systemctl start mediamtx
          systemctl enable padel-recorder
          # padel-recorder starts after deploy.ps1 copies cloud_recorder.py

  RecorderEIP:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref RecorderInstance
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-recorder-ip"

Outputs:
  ApiEndpoint:
    Description: Lambda web UI URL
    Value: !Sub "https://${PadelReplayApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${EnvironmentName}-api-endpoint"

  S3BucketName:
    Description: S3 bucket for clips
    Value: !Ref PadelClipsBucket
    Export:
      Name: !Sub "${EnvironmentName}-bucket"

  DynamoDBTable:
    Description: DynamoDB table
    Value: !Ref PadelClipsTable
    Export:
      Name: !Sub "${EnvironmentName}-table"

  RecorderPublicIP:
    Description: EC2 recorder public IP
    Value: !Ref RecorderEIP
    Export:
      Name: !Sub "${EnvironmentName}-recorder-ip"
